
name: Productive Readme

on:
  workflow_dispatch:
  schedule:
    # Runs every 2 hours
    - cron: "0 */2 * * *"

jobs:
  update-readme:
    name: Update this repo's README
    runs-on: ubuntu-latest
    steps:
      - uses: yuukidach/productive-box@master
        with:
          PRODUCTIVE_API_KEY: ${{ secrets.PRODUCTIVE_API_KEY }}
